    description: "For a minimal human_interface product (menu bar icon with dropdown), 5 of 7 universal artifacts were substantively minimal — Data Model, Security Model, NFRs, Operational Spec all mostly documented absence. The artifact selection process correctly generated minimal artifacts, but the effort of generating and reviewing 7 artifacts for a product with essentially no data, no security, no operations, and no scaling needs suggests the artifact set could be smarter about truly minimal products."
    evidence: "Data Model had one runtime struct with 4 fields. Security Model was 6 lines of not applicable. Operational Spec was restart the app. NFRs were half a page. Only Product Brief and Test Specifications had substantive content."
    proposed_action: "Consider a minimal product threshold where products below a certain complexity (e.g., no persistence, no auth, no network, single-user local) generate only Product Brief, Test Specifications, and Dependency Manifest. The others add governance overhead without proportionate value."
