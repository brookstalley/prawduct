    description: "Framework vocabulary defaults to UI application concepts. Universal artifact instructions and skill language use terms like 'core flows,' 'empty state,' and 'first-run experience' that require reframing for non-UI shapes. Each new shape needs vocabulary translation, not just new sections."
    evidence: "Adding automation/pipeline support required reframing 'core flows' to 'pipeline stages' in artifact generator notes, 'first-run experience' to 'first-run output' in domain analyzer proactive expertise, and acknowledging 'empty state' is not a meaningful concept for headless systems."
    proposed_action: "When adding API/Service and Multi-Party shapes, audit universal artifact descriptions for UI-biased language and add shape-specific reframing notes. Consider whether universal language itself should be more shape-neutral."
    status: acted_on

  - type: missing_guidance
    stage: 3
    severity: warning
    description: "Review chain had a structural gap between risk identification (Skeptic) and test specification coverage. Each component appeared complete in isolation — Skeptic found risks, Artifact Generator produced test specs — but nothing verified the connection between them. Gaps between components are invisible when each component is reviewed independently."
    evidence: "The Testing Lens was created specifically to bridge this gap. Before it existed, the Skeptic could identify 'feed format changes' as a risk, and test specs could omit coverage for it, with no mechanism to detect the mismatch."
    proposed_action: "When adding future framework components, explicitly check for cross-component verification gaps. Ask: 'If Component A produces output that Component B should consume, what verifies B actually consumed it?'"
    status: acted_on

  - type: coverage
    stage: 1
    severity: warning
    description: "Automation/pipeline products have a fundamentally different failure visibility model than interactive products. UI apps fail visibly (error screens); pipelines fail silently (output just stops). This distinction required explicit, repeated emphasis across multiple skills — a single mention in one skill was insufficient because each skill makes independent decisions."
    evidence: "Silent failure concerns had to be added to: Domain Analyzer Tier 3 (proactive expertise item), Domain Analyzer risk factor interpretation, Artifact Generator monitoring spec instructions, Review Lenses Skeptic mandate (must always raise at least one silent failure finding), Review Lenses Testing focus (silent failure detection test), and the monitoring-alerting template. Omitting any one of these would leave a gap in a different part of the pipeline."
    proposed_action: "When adding API/Service shape, identify the analogous 'invisible by default' concern (likely: contract violations that callers silently work around, version drift that accumulates without breaking). Ensure it's addressed at every skill touchpoint, not just one."
    status: acted_on

