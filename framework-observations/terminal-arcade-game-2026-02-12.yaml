    description: "C5 rubric criterion specifies user_expertise.domain_knowledge should be 'basic' for this scenario, but the test persona (Jordan Reyes) references Galaga mechanics accurately, which demonstrates more than 'basic' domain knowledge. The system assigned 'intermediate' which is defensible."
    evidence: "Rubric says domain_knowledge at basic (entertainment/game design is not their expertise). project-state.yaml has domain_knowledge: intermediate with evidence 'References Galaga by name and describes its mechanics accurately.' The persona knows what makes Galaga fun but cannot design difficulty curves — this is between basic and intermediate."
    proposed_action: "Consider updating the rubric to specify 'basic to intermediate' for domain_knowledge in this scenario, or add anchor examples to the expertise calibration scale to clarify the boundary between basic and intermediate domain knowledge."
    status: acted_on

  - type: proportionality
