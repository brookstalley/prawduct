observations:
  - type: rubric_issue
    stage: meta
    severity: note
    description: "Several Builder and Orchestrator rubric criteria are inherently unable-to-evaluate in simulation evaluations. These criteria address gameplay feel, conversational naturalness, and cross-platform behavior — experiential qualities that require interactive testing. The rubric does not distinguish between simulation-evaluable and interactive-only criteria."
    evidence: "9 criteria marked UNABLE across Builder (3: player rendering, gameplay feel, cross-platform), Orchestrator (3: technical terminology naturalness, over-explaining, process weight), Iteration (1: high score visual integration), and Review Lenses (1: finding count). These were all simulation limitations, not framework failures, but they are indistinguishable from genuine gaps in the eval results."
    proposed_action: "Annotate rubric criteria with evaluation method requirement (simulation-ok vs requires-interactive). This would allow simulation evals to skip interactive-only criteria cleanly and track them separately for follow-up interactive evaluation."
    status: acted_on

  - type: process_friction
    stage: 5
    severity: note
    description: "build_state.spec_compliance and build_state.reviews arrays remain empty after completing all 7 build chunks and a Stage 6 iteration. Governance checkpoints are defined but compliance tracking is not structured per-chunk in the project state file."
    evidence: "project-state.yaml has spec_compliance.requirements: [] and reviews: [] despite 7 completed build chunks with 224 tests and two defined governance checkpoints. Compliance was demonstrated through test suite growth (0->28->71->108->148->175->200->224) but not through structured per-chunk compliance records."
    proposed_action: "Consider whether Builder/Critic should populate spec_compliance and reviews entries in project-state.yaml after each chunk. This would provide audit trail without adding significant process weight. Watch for a second instance before acting."
    status: triaged

  - type: coverage
    stage: 3
    severity: note
    description: "Review Lens findings are integrated into artifact generation narrative rather than recorded as a separate structured document. Finding count is ambiguous when findings are woven into phased review text rather than listed discretely."
    evidence: "C4 quality criterion on total findings (8-15 range) was UNABLE to evaluate because findings were part of Phase A/B/C review narratives in the transcript. Approximately 12-14 distinct findings identifiable but exact count depends on how narrative observations are decomposed. This is the second evaluation to note this pattern (also observed in previous terminal-arcade-game eval at a7b2df1)."
    proposed_action: "This is now at requires_pattern status (seen in 2 evals). If a third eval surfaces the same observation, consider: (1) adding a findings count or findings summary section to transcript output, or (2) recording findings in project-state.yaml, or (3) clarifying in the rubric that narrative integration is acceptable and adjusting the counting criterion."
    status: requires_pattern

  - type: rubric_issue
    stage: 2
