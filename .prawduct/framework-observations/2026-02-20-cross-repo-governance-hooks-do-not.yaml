    description: "Cross-repo governance hooks do not fire for the target repo when the session CWD is a different repo. Hooks resolve from CLAUDE_PROJECT_DIR (the session root), not from the git root of the file being edited. In a session rooted in prawduct, edits to worldground/viewer/index.html triggered prawduct hooks but not worldground hooks. This means worldground governance-gate, governance-tracker, and governance-stop never ran. The CLAUDE.md bootstrap instruction (ALWAYS read orchestrator SKILL.md FIRST) only applies when someone opens the prawduct directory — it has no effect on cross-repo edits. The orchestrator SKILL.md step 1a2 documents cross-repo detection and step 3 writes activation markers to both repos, but the mechanical hooks that enforce governance (gate blocking unreviewed edits, tracker counting file changes, stop blocking session completion with debt) only fire in CLAUDE_PROJECT_DIR. This creates a structural gap: governance for the target repo depends entirely on the agent voluntarily following SKILL.md instructions, with no mechanical backstop."
    evidence: "Session: CWD=prawduct, edited worldground/viewer/index.html. Agent implemented full globe view feature (480+ lines) without any governance activation. No worldground hooks fired. The .orchestrator-activated marker in worldground was never written. Session-governance.json in worldground was stale from a prior session. Only after user asked 'what about the orchestrator?' did the agent engage governance retroactively. The prawduct hooks DID fire (UserPromptSubmit success messages visible in transcript), but they resolved against prawduct .prawduct/ state, not worldground .prawduct/ state."
    status: noted
    root_cause_analysis:
      symptom: "Target repo governance hooks do not fire in cross-repo sessions"
      root_cause: "Hook commands in .claude/settings.json use CLAUDE_PROJECT_DIR to locate the product root. When the session is rooted in repo A but edits target repo B, all hooks resolve against repo A. The orchestrator documents cross-repo awareness (step 1a2) and writes dual activation markers (step 3), but these are voluntary agent behaviors. The mechanical enforcement layer (gate.py, tracker.py, stop.py, commit.py) has no way to detect that an edit targets a different repo and switch to that repos governance state. The gap is that governance enforcement is repo-scoped by hooks but edit scope is cross-repo."
      category: missing_detection
