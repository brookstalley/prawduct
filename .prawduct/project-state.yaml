    why: Prawduct sessions are context-heavy and governance-rich, but users have no persistent at-a-glance view of where they
      are in the process, what governance debt exists, or how much context runway remains. Added prawduct-statusline.py that
      reads Claude Code stdin JSON + project-state.yaml + session-governance.json + critic-findings.json + git state. Line 1
      shows prawduct state (stage, chunk progress, governance alerts with CRITIC/CHUNK/CP/PFR/DCP/OBS labels). Line 2 shows
      context bar + git branch/staged/modified + duration. Non-prawduct projects get only Line 2. Extended prawduct-init.py
      to generate statusLine config for product repos with runtime framework resolution.
    blast_radius: tools/prawduct-statusline.py (new), .claude/settings.json, tools/prawduct-init.py, docs/project-structure.md
    classification: enhancement
    date: 2026-02-18
  - what: Add observation capture enforcement to governance-stop.sh
    why: 'Retroactive review of MetaLLM (7 chunks, 15+ warning findings) produced zero observations until user asked. Root cause
      (5-whys): observation capture depends on procedural compliance (Orchestrator Step 7) not mechanical enforcement. The framework
      already solved this for Critic reviews (governance-stop.sh blocks without review) but not for observations. Fix: governance-stop.sh
      now checks if Critic findings have warning/blocking severity but observations_captured_this_session == 0. GitHub issue
      #4.'
    blast_radius: .prawduct/hooks/governance-stop.sh, .prawduct/artifacts/governance-mechanisms.md, CLAUDE.md
    classification: functional
    date: 2026-02-18
  - what: 'Audit items 1-5: governance measurement, Critic/Lenses temporal ownership + Lenses subagent, persona sharpening,
      quickstart + todo scenario, Pattern Extractor subagent'
    why: 'External audit identified 10 recommendations. Implemented top 5 by benefit/effort: (1) Hook timing instrumentation
      + context overhead measurement — can now measure governance cost. (2) Critic/Lenses overlap resolved via temporal ownership
      (retrospective vs prospective) + Lenses moved to subagent pattern (~5.5k tokens freed). (3) Target persona sharpened from
      "anyone" to two specific primary personas. (4) Zero-friction quickstart: prawduct-quick script + docs/quickstart.md +
      quick-todo-app test scenario. (5) Pattern Extractor subagent for automated observation triage with extract-patterns.sh
      wrapper.'
    blast_radius: tools/governance-hook, tools/measure-context-overhead.sh (new), .gitignore, skills/critic/SKILL.md, skills/review-lenses/SKILL.md,
      skills/orchestrator/protocols.md, skills/orchestrator/stages-0-2.md, skills/orchestrator/stages-3-4.md, skills/orchestrator/stage-5-build.md,
      skills/orchestrator/SKILL.md, tools/record-lens-findings.sh (new), docs/vision.md, README.md, tools/prawduct-quick (new),
      docs/quickstart.md (new), tests/scenarios/quick-todo-app.md (new), skills/pattern-extractor/SKILL.md (new), tools/extract-patterns.sh
      (new), tools/session-health-check.sh, docs/project-structure.md, .prawduct/project-state.yaml
    classification: enhancement
    date: 2026-02-19
  - what: 'Move Critic from in-context skill to subagent: Critic Agent Protocol, updated invocation in stage-5/6, simplified
      CLAUDE.md compaction recovery'
    why: 'Critic skill (6,900 tokens) loaded into main context caused three problems: cognitive interference with Builder instructions,
      self-review conflict (same LLM reviews its own work), compaction fragility (Critic instructions lost on compaction). Root
      cause (5-whys): skill-as-in-context-instructions model is wrong for review functions that benefit from independence. Fix:
      Critic invoked as a separate agent via Task tool. Agent reads SKILL.md in its own context, providing genuinely independent
      review. Hook system, evidence format (.critic-findings.json), and all mechanical enforcement unchanged. Main context reduced
      by ~6,900 tokens (45% of the instruction-heavy stage). Critic Agent Protocol in protocols.md defines invocation, prompt
      template, output verification, and fallback. Initial validation: agent successfully reviewed its own migration (10 files,
      7 checks, caught 2 surviving old-pattern references that were then fixed).'
    blast_radius: skills/orchestrator/protocols.md, skills/critic/SKILL.md, skills/orchestrator/stage-5-build.md, skills/orchestrator/stage-6-iteration.md,
      CLAUDE.md, tools/governance/reinject.py, tools/critic-reminder.sh, tools/governance/__main__.py, tools/governance/commit.py,
      .prawduct/artifacts/governance-mechanisms.md, .prawduct/project-state.yaml
    classification: structural
    date: 2026-02-19
    retrospective: 'Detection: The self-review conflict pattern was identified through observation history analysis, not by
      the learning system itself. The observation system tracks governance_compliance and process_friction but did not have
      a type for "architectural limitation causing systemic instruction-following failures." The closest type (architectural_inconsistency)
      works but doesn''t quite capture "the invocation model itself is wrong." Process: The implementation mapped cleanly to
      a single phase. Key validation: the Critic agent successfully ran its own migration review (proving the mechanism works)
      and caught 2 surviving references the implementation missed (proving independence adds value). The initial review found
      the issues, fixes were applied, re-review passed clean. Evidence format compatibility was confirmed — .critic-findings.json
      from the agent is identical to what the in-context Critic produces. Generalization: This pattern (review functions benefit
      from isolation) may apply to Review Lenses (Phase 2, deferred). The key test for other skills: does this skill benefit
      from NOT seeing the main conversation? Builder does not (needs interaction), Orchestrator does not (IS the conversation),
      Domain Analyzer might not (somewhat interactive). Review skills benefit most because independence is a feature, not a
      limitation.'
  - what: 'Close fail-open governance escape: external git repo detection in edit gate'
    why: 'Cross-repo governance escape — an entire product (worldground) was built without governance because the edit gate
      treated files outside known repos as "ungoverned" and auto-allowed them. 5-whys root cause: gate.py classified files into
      framework/product/ungoverned with ungoverned=auto-allow; files in unregistered git repos fell into ungoverned bucket;
      no backstop when Orchestrator wasn''t loaded. Fix: classify.py gains is_external_repo flag via lightweight .git directory
      walk (handles worktrees/submodules, cached by directory prefix). gate.py blocks external-repo edits with actionable messages
      ("onboard this repo or restart without Prawduct"). prompt.py gains product-context validation (detects broken .active-product
      pointer). Governance perimeter now: framework files = governed, product files = governed, external git repo files = blocked,
      non-repo files = allowed.'
    blast_radius: tools/governance/classify.py, tools/governance/gate.py, tools/governance/prompt.py, .prawduct/artifacts/governance-mechanisms.md,
      .prawduct/artifacts/failure-recovery-spec.md, .prawduct/project-state.yaml
    classification: structural
    date: 2026-02-20
    retrospective: 'Detection: Related observation existed (2026-02-17, marker-write bypass, same process_not_enforced category)
      but the learning system did not generalize from "markers can be faked" to "what else does the gate fail to check?" Structural
      Critique Protocol could have caught this deductively ("does ungoverned=auto-allow satisfy fail-closed principle?") but
      triggers too infrequently. Process: Session-governance file was deleted mid-session (likely SessionStart cleanup from
      a previous/parallel session), causing PFR gate to read wrong product state (blobdrop instead of prawduct). The .active-product
      pointer is a shared resource vulnerable to concurrent session clobber — known limitation but caused real friction. Generalization:
      The pattern "classify unknown inputs as suspicious rather than safe" applies to any gate with an unrecognized-input default.
      Git-repo detection is a general, dimensional discriminator (not enumeration).'
