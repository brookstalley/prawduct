# =============================================================================
# CHANGE LOG
# =============================================================================

change_log:
  - what: 'Summary: 2 entries compacted (2026-02-17 to 2026-02-18)'
    why: '1 cosmetic, 1 functional covering: Summary: 2 entries compacted (2026-02-16 to 2026-02-17); Fix README.md staleness
      + close governance gap for human-facing docs'
    blast_radius: compacted
    classification: cosmetic
    date: '2026-02-18'
  - what: Replaced product shape taxonomy with concern-based classification
    why: Fixed shapes (UI Application, API, Automation, Multi-Party, Hybrid) violated 'Generality Over Enumeration' principle.
      Products like earbud firmware, browser extensions, smart contracts don't fit any shape. Replaced with 7 composable concern
      dimensions (human_interface, unattended_operation, api_surface, multi_party, constrained_environment, external_integrations,
      sensitive_data) that combine freely. Added Structural Critique Protocol to catch similar foundational issues.
    blast_radius: Domain Analyzer, Artifact Generator, Review Lenses, Orchestrator, Critic, project-state schema, high-level
      design, principles, all test scenarios, CLAUDE.md, observation schema
    classification: directional
    date: 2026-02-12
  - what: Consolidated work tracking into project-state.yaml remaining_work
    why: Work tracking was scattered across 8+ files with partial conflicts. Made remaining_work the canonical tracker with
      23 phased items (v1-widen, v1-validation, v1.5). Converted skill 'Extending This Skill' sections from feature roadmaps
      to extension guidance. Fixed staleness in requirements.md and high-level-design.md.
    blast_radius: project-state.yaml, CLAUDE.md, docs/requirements.md, docs/high-level-design.md, all 6 skill SKILL.md files
    classification: directional
    date: 2026-02-13
  - what: Replaced concern enumeration with structural characteristics + dynamic domain depth
    why: 7 hardcoded concerns violated 'Generality Over Enumeration' — the concern system did two different jobs (structural
      artifact routing and domain-specific depth) and the domain-specific half couldn't scale to cover all product types. Replaced
      with 5 stable structural characteristics for artifact routing and dynamic LLM-generated questions guided by 9 universal
      discovery dimensions and structural amplification rules. Eliminated 4 remaining_work items (deepen api_surface, deepen
      multi_party, additional domain overlays, open question about concern coverage). Domain-specific depth now comes from the
      LLM's own knowledge, not hardcoded question banks.
    blast_radius: All 6 skills, templates/project-state.yaml, project-state.yaml, docs/high-level-design.md, CLAUDE.md, all
      3 test scenarios
    classification: directional
    date: 2026-02-13
    retrospective: 'Concern enumeration violated Generality for weeks undetected. Root cause: Structural Critique Protocol trigger
      cadence too low (every 3 evals, effectively never), Directional Change Protocol had no learning step. The 17-file reform
      produced zero captured learnings until the user asked. Fix: retrospective step added to DCP, Structural Critique triggers
      expanded to include directional changes. Key insight: governance (Critic) validates quality but retrospective captures
      learning — both required for framework development.'
  - what: Unified governance and generalized artifact generation
    why: 'Framework violated ''Eat Your Own Cooking'' (separate governance paths for framework vs. product — 8 hooks in two
      parallel stacks, 2 Critic modes, 2 state files) and ''Generality Over Enumeration'' (Artifact Generator hardcoded 575
      lines of per-artifact format specs). Unified to: 5 hooks with single .session-governance.json state, 1 context-sensitive
      Critic with 9 checks and applicability table, Artifact Generator reduced from 789→189 lines by moving format specs to
      templates, observation backlog enabled for all projects, single Directional Change Protocol.'
    blast_radius: All 6 skills, .claude/hooks/ (8 deleted, 4 created, 2 updated), .claude/settings.json, templates/project-state.yaml,
      templates/product-brief.md, templates/data-model.md, tools/record-critic-findings.sh, tools/critic-reminder.sh, docs/high-level-design.md,
      docs/self-improvement-architecture.md, docs/doc-manifest.yaml, CLAUDE.md, project-state.yaml
    classification: directional
    date: 2026-02-14
    retrospective: 'Detection: The ''Eat Your Own Cooking'' violation (parallel governance stacks) was visible for weeks but
      not detected by the learning system because observation types didn''t include ''architectural inconsistency with stated
      principles.'' The Structural Critique Protocol could have caught this but its trigger cadence (every 3 evals) was too
      low. Process: The phased implementation (hooks → Critic → artifacts → docs) worked well — each phase was independently
      testable. The Critic review found 4 stale cross-references, confirming that documentation freshness checks catch real
      issues. Architecture: The unified governance state (.session-governance.json) creates a single point of failure — if the
      state file is corrupted, all governance tracking is lost. The previous dual-file approach had natural redundancy. Mitigation:
      SessionStart cleanup creates a fresh file each session, limiting blast radius. Generalization: This pattern (parallel
      implementations for ''framework'' and ''product'' that should be unified) should be checked whenever new framework capabilities
      are added — does the capability apply identically to both contexts?'
  - what: 'Strengthened framework generality: three-layer artifact generation, absorbed Critic sub-components, vocabulary debiasing,
      Builder governance improvements'
    why: Several remaining_work items planned enumerated components (template directories per characteristic, named Critic sub-components)
      when the framework's own Generality Over Enumeration principle argues for strengthening general capabilities. Templates
      conflated two jobs (what to generate vs. quality properties) — separated into amplification rules + process constraints
      + optional template reference. Critic sub-components (Architectural Consistency, Documentation Controller, Operational
      Readiness) absorbed into existing checks. UI-centric vocabulary generalized for non-screen modalities. Builder spec_compliance
      made risk-proportionate.
    blast_radius: skills/artifact-generator/SKILL.md, skills/critic/SKILL.md, skills/review-lenses/SKILL.md, skills/domain-analyzer/SKILL.md,
      skills/builder/SKILL.md, templates/product-brief.md, project-state.yaml (remaining_work, artifact_manifest, observation_backlog,
      change_log), docs/high-level-design.md, CLAUDE.md
    classification: directional
    date: 2026-02-14
  - what: 'User feedback overhaul: remove confirmation pauses, eliminate Stage 0.5, apply lenses to all products, fix project
      naming, gate skill/template reads behind Orchestrator activation'
    why: 'Real users reported four friction areas: (1) framework stops too often asking permission at every stage gate, (2)
      project names chosen before asking user, (3) lenses only applied to high-risk products at Stage 2, (4) no mechanical enforcement
      that skills are accessed through the Orchestrator. Removed Stage 0.5 (Validation) entirely — if the user asks to build
      something, help them build it. Removed all confirmation pauses — present information and keep moving, only stop when genuinely
      blocked. Extended governance-gate.sh to block reads of skill/template files (except orchestrator/SKILL.md) without Orchestrator
      activation. Added three new remaining_work items for future phases: closed-loop testing MCP server, existing project onboarding,
      and old prawduct version migration.'
    blast_radius: skills/orchestrator/SKILL.md (Stage 0, Stage 0.5, Stage 2, Stage 3, Stage 4, Stage 5, Stage Transition Protocol,
      FRP table), .claude/hooks/governance-gate.sh, .claude/hooks/governance-prompt.sh, .claude/settings.json, CLAUDE.md, project-state.yaml
