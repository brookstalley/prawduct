# Project State — Prawduct Framework (Self-Hosted)
#
# The framework IS a product in Stage 6 (iteration). This file tracks its own
# state using the same structure it prescribes for user products.
#
# Tier: 1 (Source of Truth)
# Owner: Orchestrator (C1) manages; all skills may read/write their sections.

# =============================================================================
# SPLIT FILE POINTERS
# =============================================================================
# Static sections split for context efficiency. Loaded on demand.

definition_file: project-definition.yaml    # classification, product_definition, technical_decisions, design_decisions
artifact_manifest_file: artifact-manifest.yaml  # full artifact manifest with dependency graph
deferred_backlog_file: observation-backlog-deferred.yaml  # priority: deferred observation items

# =============================================================================
# DEPENDENCY GRAPH
# =============================================================================

dependency_graph:
  - decision_id: skill-interaction-model
    description: "Skills operate as LLM instruction sets — most in main context, review skills (Critic) as independent subagents"
    affects_decisions: []
    affects_artifacts: [orchestrator, domain-analyzer, artifact-generator, review-lenses, critic, builder]
  - decision_id: file-based-persistence
    description: "Project state and artifacts stored as files in project directory"
    affects_decisions: []
    affects_artifacts: [project-state-template, orchestrator]

# =============================================================================
# OPEN QUESTIONS
# =============================================================================

open_questions:
  - question: "How should observation capture work when framework repo isn't writable?"
    blocking: "Observation capture in non-local deployment scenarios"
    waiting_on: research
    priority: medium
    raised_at_stage: iteration
  - question: "Does the 5-structural-characteristic set adequately route artifact needs for all product types?"
    blocking: "Full product diversity coverage (R7.2)"
    waiting_on: research
    priority: low
    raised_at_stage: iteration

# =============================================================================
# USER EXPERTISE PROFILE
# =============================================================================
# For framework development, the "user" is the framework developer.

user_expertise:
  product_thinking: advanced
  technical_depth: advanced
  design_sensibility: intermediate
  domain_knowledge: advanced
  operational_awareness: intermediate
  evidence:
    - dimension: product_thinking
      signal: "Designed self-referential governance system with explicit principles"
      inferred_from: "Framework architecture and principles docs"
    - dimension: technical_depth
      signal: "Multi-skill coordination design, artifact dependency model"
      inferred_from: "High-level design document"

# =============================================================================
# PROCESS STATE
# =============================================================================

current_stage: iteration

