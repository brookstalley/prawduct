# Project State — Prawduct Framework (Self-Hosted)
#
# The framework IS a product in iteration phase. This file tracks its own
# state using the same structure it prescribes for user products.

# =============================================================================
# DEPENDENCY GRAPH
# =============================================================================

dependency_graph:
  - decision_id: principles-plus-structural-gates
    description: "Principles govern how-to-work behaviors; structural gates (hooks) enforce process-interruption behaviors Claude can't self-regulate"
    affects_artifacts: [CLAUDE.md, methodology/, agents/critic/, tools/product-hook]
  - decision_id: product-self-containment
    description: "Product repos carry everything needed to build — own CLAUDE.md, hooks, Critic instructions. No runtime dependency on framework."
    affects_artifacts: [templates/, tools/prawduct-setup.py]
  - decision_id: critic-as-separate-agent
    description: "Critic invoked via Task tool as independent agent, not in main context"
    affects_artifacts: [agents/critic/SKILL.md, .prawduct/critic-review.md]

# =============================================================================
# OPEN QUESTIONS
# =============================================================================

open_questions:
  - question: "Does the 5-structural-characteristic set adequately route artifact needs for all product types?"
    blocking: "Full product diversity coverage"
    waiting_on: research
    priority: low
    raised_at_stage: iteration

# =============================================================================
# USER EXPERTISE PROFILE
# =============================================================================

user_expertise:
  product_thinking: advanced
  technical_depth: advanced
  design_sensibility: intermediate
  domain_knowledge: advanced
  operational_awareness: intermediate

# =============================================================================
# PROCESS STATE
# =============================================================================

# =============================================================================
