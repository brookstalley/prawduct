# Project State — {{PRODUCT_NAME}}
#
# Single source of truth for all project decisions.
# Read at session start to understand where things stand.
#
# Fields start as null and are filled during discovery.
# Partially-populated state is normal throughout discovery.

# =============================================================================
# CLASSIFICATION
# =============================================================================
# Populated during discovery. Confirmed with the user before planning.

classification:
  # Product domain. Values: utility, social, marketplace, productivity, b2b,
  # content, automation, developer-tool, education, health, finance,
  # entertainment, communication. May be multiple for hybrid products.
  domain: null

  # Structural characteristics — architectural facts that determine what KINDS
  # of artifacts a product needs. These are a small, stable set (5) that drive
  # artifact generation. null = not applicable.
  structural:
    # User-facing interface. modality: screen|terminal|voice|spatial|minimal; platform: mobile|web|desktop|cross-platform
    has_human_interface: null
    # Runs without user interaction. trigger: scheduled|event-driven|always-on
    runs_unattended: null
    # Exposes or consumes APIs. consumers: internal|external|both
    exposes_programmatic_interface: null
    # Multiple distinct user types. parties: [list of distinct user types]
    has_multiple_party_types: null
    # Handles sensitive information. categories: [PII, financial, health, etc.]; regulatory: [list]
    handles_sensitive_data: null

  # Domain-specific characteristics — what makes THIS product unique in its domain.
  # Dynamically identified, not from a predefined list.
  # Each: { characteristic: string, implications: [string] }
  domain_characteristics: []

  # Risk and complexity profile.
  risk_profile:
    # Overall risk: low, medium, high.
    # Drives discovery depth (low: 5-8 questions, medium: 8-15, high: 15-25).
    overall: null
    # Specific risk factors identified during classification.
    # Each: { factor, level (low/medium/high), rationale }
    factors: []

  # Prior art surfaced during discovery (via web search or domain knowledge).
  # Informational — informs scope decisions, not a gate.
  # Each: { name, url (optional), relevance, relationship (alternative|complement|reference) }
  prior_art: []

# =============================================================================
# PRODUCT DEFINITION
# =============================================================================
# Populated during discovery and definition.

product_definition:
  # One-sentence description of what this product is and why it exists.
  vision: null

  # Measurable success criteria. What does "this worked" look like?
  goals: []

  # Who uses this product and what they need.
  users:
    # Each persona:
    #   name: string
    #   description: string
    #   technical_level: none | basic | intermediate | advanced
    #   primary_needs: [string]
    #   constraints: [string]
    personas: []

  # Core user flows (UI), operations (API), or pipeline stages (automation).
  # Each: { name, description, steps (optional), priority (must-have/nice-to-have) }
  core_flows: []

  # Scope decisions.
  scope:
    v1: []                # Must have for initial release
    accommodate: []       # Design for but don't build yet
    later: []             # Not needed for v1 to be useful
    never: []             # Explicitly out of scope. Each: { item, rationale }

  # Product identity.
  product_identity:
    name: "{{PRODUCT_NAME}}"
    personality: null     # Brand personality, mood (null for internal tools)
    visual_preferences: null  # Look/feel preferences (null for non-visual products)

  platform: null          # Where this runs (web, mobile, CLI, etc.)

  # Non-functional requirements, calibrated to risk.
  nonfunctional:
    performance: null
    scalability: null
    uptime: null
    cost_constraints: null

  regulatory: []          # Each: { regulation, applicability, impact }
  cost_estimates: []      # Each: { item, estimated_monthly_cost, notes }

# =============================================================================
# TECHNICAL DECISIONS
# =============================================================================
# Every entry includes rationale.
# Each: { decision, rationale, alternatives_considered, date }

technical_decisions:
  architecture: []
  technology: []
  data_model: []
  integrations: []
  operational: []

# =============================================================================
# DESIGN DECISIONS
# =============================================================================
# UX, IA, and design decisions. Some fields (like error_handling_approach) apply
# to all products; others (like visual_direction) only apply to products with a UI.
# Each: { decision, rationale, date }

design_decisions:
  information_architecture: []
  interaction_patterns: []
  accessibility_approach: null
  error_handling_approach: null
  observability_approach: null    # Signal types, correlation context, sensitive data filtering, operational model
  infrastructure_dependencies: null  # External services (DB, queue, auth, APIs), mock boundaries, integration test strategy
  visual_direction: null

# =============================================================================
# OPEN QUESTIONS
# =============================================================================
# Unresolved decisions. Normal during discovery, shrinks toward zero
# before artifact generation.
# Each:
#   question: string
#   blocking: string (what can't proceed)
#   waiting_on: "user" | "research"
#   priority: high | medium | low

open_questions: []

# =============================================================================
# USER EXPERTISE PROFILE
# =============================================================================
# Inferred from conversation signals, never self-assessed.
# Drives vocabulary, explanation depth, and involvement calibration.

user_expertise:
  product_thinking: null      # none | basic | intermediate | advanced
  technical_depth: null
  design_sensibility: null
  domain_knowledge: null
  operational_awareness: null
  evidence: []                # Each: { dimension, signal, inferred_from }

# =============================================================================
# BUILD PREFERENCES
# =============================================================================
# Developer preferences captured during discovery (testing approach, code style,
# tooling). Optional — only when the user expresses preferences.

build_preferences:
  file_path: null             # Path to project-preferences.md (relative to .prawduct/)
  last_updated: null
  source: null                # discovery | inferred | iteration

# =============================================================================
# WORK IN PROGRESS
# =============================================================================
# Tracks what's being done now and at what governance level.
# Replaces the v4 current_phase field (there are no phases in v5).

work_in_progress:
  # Current work description. null when nothing active.
  description: null
  # Governance level: trivial | small | medium | large
  size: null
  # Work type: feature | bugfix | refactor | optimization | debt | hotfix
  type: null

# =============================================================================
# HEALTH CHECK
# =============================================================================
# Tracks periodic health check state. Health checks are triggered by
# accumulating staleness signals, not by a fixed cadence.

health_check:
  last_full_check: null
  last_check_findings: null

# =============================================================================
# ARTIFACT MANIFEST
# =============================================================================
# Tracks generated artifacts and their relationships.

artifact_manifest:
  # Each:
  #   name: string
  #   file_path: string (relative to project root)
  #   version: integer
  #   depends_on: [artifact names]
  artifacts: []

# =============================================================================
# BUILD PLAN
# =============================================================================
# Populated during planning. Tracked during building.

build_plan:
  # Build strategy: feature-first | layer-first | hybrid
  strategy: null

  # Ordered build chunks. Each is a unit of work.
  chunks: []
  #   - id: "chunk-01"
  #     name: "Project scaffold"
  #     description: "Initialize project, install dependencies, verify build and test"
  #     depends_on: []
  #     deliverables: ["package.json", "build config", "test runner"]
  #     acceptance_criteria: ["npm install succeeds", "npm run dev starts", "npm test runs"]
  #     status: pending  # pending | in_progress | review | complete | blocked

  current_chunk: null

# =============================================================================
# BUILD STATE
# =============================================================================
# Runtime tracking during building. Updated after each chunk.

build_state:
  source_root: null           # Where source code lives (e.g., "src/")

  test_tracking:
    test_count: 0
    test_files: []
    # Per-chunk history: { chunk_id, tests_run, tests_passed, tests_failed }
    history: []

# =============================================================================
# CHANGE LOG
# =============================================================================
# Significant changes to project state.
# Each:
#   what: string
#   why: string
#   classification: cosmetic | functional | directional
#   date: YYYY-MM-DD

change_log: []
