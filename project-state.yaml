      requirements: [R1.9]
      skill: domain-analyzer
    - item: "Cost awareness in artifacts"
      description: "Artifacts include cost estimates and tradeoff analysis for infrastructure and operational decisions"
      phase: v1.5
      requirements: [R2.6]
      skill: artifact-generator
    - item: "Accessibility enforcement in Critic"
      description: "Critic checks accessibility requirements are met in human_interface products"
