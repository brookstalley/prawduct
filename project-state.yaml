# Project State — Prawduct Framework (Self-Hosted)
#
# The framework IS a product in Stage 6 (iteration). This file tracks its own
# state using the same structure it prescribes for user products.
#
# Tier: 1 (Source of Truth)
# Owner: Orchestrator (C1) manages; all skills may read/write their sections.

# =============================================================================
# CLASSIFICATION
# =============================================================================

classification:
  domain: developer-tool

  structural:
    has_human_interface: null  # Framework has no user-facing UI (conversation is LLM-mediated)
    runs_unattended:
      trigger: event-driven
      # Rationale: Prawduct runs within an LLM session, processes inputs through
      # stages, produces artifacts. The "trigger" is user input, but the processing
      # pipeline (classify → discover → define → generate → build) is automated.
    exposes_programmatic_interface:
      consumers: internal
      # Rationale: Skills define contracts consumed by other skills (skill
      # interaction model, artifact format spec, project-state schema).
    has_multiple_party_types: null
    handles_sensitive_data: null

  domain_characteristics:
    - characteristic: "LLM instruction framework"
      implications: ["skills are instructions not code", "non-deterministic output", "single-context execution model"]
    - characteristic: "self-referential governance"
      implications: ["framework governs its own development", "Critic reviews Critic changes", "circular dependency risk"]

  risk_profile:
    overall: medium
    factors:
      - factor: downstream-impact
        level: high
        rationale: "Bad framework advice propagates to every product built with it. A flawed discovery question or missing governance check affects all downstream users."
      - factor: technical-complexity
        level: medium
        rationale: "Multi-skill coordination, cross-artifact consistency, and self-referential governance (framework governs its own development) introduce real complexity."
      - factor: data-sensitivity
        level: low
        rationale: "Framework itself handles no user data. Products built with it may, but that's governed per-product."
      - factor: failure-impact
        level: medium
        rationale: "Framework failure means bad product specs, not data loss or safety incidents. But bad specs waste significant user time."

# =============================================================================
# PRODUCT DEFINITION
# =============================================================================

product_definition:
  vision: "A framework that turns vague product ideas into well-built software by guiding structured discovery, producing agent-executable build plans, and enforcing quality throughout development."

  goals:
    - "End-to-end flow from vague input to useful build plan for any combination of product concerns"
    - "Framework governs its own development through its own process (eat your own cooking)"
    - "Observation capture fires automatically at every stage transition — no manual reminders needed"
    - "Review Lenses produce specific, actionable findings across all product shapes"

  users:
    personas:
      - name: "Product Builder"
        description: "Someone with a product idea who wants to build it with LLM assistance. Ranges from non-technical to expert."
        technical_level: varies
        primary_needs:
          - "Turn a vague idea into a concrete, buildable plan"
          - "Get product thinking they don't have (architecture, security, accessibility, operations)"
          - "Build with quality governance that catches issues early"
        constraints:
          - "Patience varies — some want thorough discovery, some want to build immediately"
          - "Expertise varies across all dimensions"
      - name: "Framework Developer"
        description: "Someone contributing to Prawduct itself — improving skills, templates, tools, or docs."
        technical_level: advanced
        primary_needs:
          - "Understand what to work on next (build order, phase status)"
          - "Make changes governed by the framework's own quality process"
          - "Capture observations that improve the framework over time"
        constraints:
          - "Must follow the framework's own principles while changing them"

  core_flows:
    - name: "Discovery to Build Plan"
      description: "User describes a product idea; framework classifies, discovers, defines, generates artifacts, and produces a build plan."
      priority: must-have
    - name: "Build with Governance"
      description: "Builder executes build plan chunks; Critic reviews each chunk; tests enforced throughout."
      priority: must-have
    - name: "Framework Self-Improvement"
      description: "Framework development follows the same Orchestrator process, capturing observations and running Critic governance."
      priority: must-have

  scope:
    v1:
      - "Five structural characteristics (has_human_interface, runs_unattended, exposes_programmatic_interface, has_multiple_party_types, handles_sensitive_data) plus dynamic domain-specific depth"
      - "Full stage pipeline (0 through 6)"
      - "Five review lenses with concern-appropriate application"
      - "Critic with context-sensitive governance (9 checks, applicability based on project state)"
      - "Builder skill for code generation from build plans"
      - "Observation capture at every stage transition"
      - "Five test scenarios with evaluation rubrics"
      - "Self-hosted framework development via Orchestrator"
    accommodate:
      - "Agent agnosticism (R7.3) — artifact formats designed for any LLM agent"
      - "Mechanical tools infrastructure (tools/ directory exists, scripts planned)"
    later:
      - item: "C7 Trajectory Monitor as dedicated component"
        rationale: "Simple heuristics in v1 suffice; dedicated component needs usage data to calibrate triggers"
      - item: "C8 full Learning System (pattern detection, validation, incorporation)"
        rationale: "Requires observation volume from many projects; premature before user base exists"
      - item: "Multi-user collaboration"
        rationale: "Current design assumes single user; team scenarios need real usage to inform design"
    never:
      - item: "Code generation without governance"
        rationale: "Violates core thesis — ungoverned code generation is the problem we're solving"
      - item: "Prescriptive technology choices"
        rationale: "Framework learns questions and problems, not solutions (Learning Principle: Learn Questions, Not Answers)"

  platform: "CLI (Claude Code) — runs within LLM sessions"

  nonfunctional:
    performance: "Conversational responsiveness — each stage transition should feel immediate to the user"
    scalability: "One project at a time per session; framework improvements benefit all future sessions"
    uptime: "Not applicable — runs within user's local LLM session"
    cost_constraints: "Zero operational cost — framework is instruction files, not infrastructure"

  regulatory: []
  cost_estimates:
    - item: "LLM inference (borne by user)"
      estimated_monthly_cost: "Varies by usage"
      notes: "Framework itself has no cost; users pay for Claude API/subscription"

# =============================================================================
# TECHNICAL DECISIONS
# =============================================================================

technical_decisions:
  architecture:
    - decision: "Skills as LLM instruction sets (SKILL.md files) operating within a single LLM context"
      rationale: "Simplest possible architecture — no infrastructure, no services, no coordination protocol. Skills switch context within one session."
      alternatives_considered: ["Multi-agent with separate LLM calls per skill", "Plugin architecture with tool registration"]
      date: 2026-02-01
    - decision: "File-based persistence in project directory"
      rationale: "Human-readable, version-controllable, requires no infrastructure. Reversible — can migrate to structured store later."
      alternatives_considered: ["Database-backed state", "In-memory with export"]
      date: 2026-02-01
  technology:
    - decision: "Markdown with YAML frontmatter for artifacts"
      rationale: "Readable by humans and LLMs. Frontmatter enables mechanical dependency tracking."
      alternatives_considered: ["Pure YAML", "JSON", "Structured markdown without frontmatter"]
      date: 2026-02-01
    - decision: "YAML for project state"
      rationale: "Supports partial resolution (null values), comments, and human readability."
      alternatives_considered: ["JSON (no comments)", "TOML (less familiar for complex nesting)"]
      date: 2026-02-01
  data_model: []
  integrations: []
  operational:
    - decision: "Git-based version control for all framework files"
      rationale: "Natural fit — framework is text files. Git provides history, branching, and collaboration."
      alternatives_considered: ["None — git is the obvious choice"]
      date: 2026-02-01

# =============================================================================
# DESIGN DECISIONS
# =============================================================================
# Framework is not a UI product, but has design decisions about its interface
# (conversation design, output format, skill organization).

design_decisions:
  information_architecture: []
  interaction_patterns:
    - decision: "Conversational interface managed by Orchestrator"
      rationale: "Natural fit for LLM-based tool. Orchestrator manages flow, other skills provide specialized behavior."
      date: 2026-02-01
  accessibility_approach: "Framework outputs (artifacts, project state) are plain text — inherently accessible. Conversation adapts to user expertise level."
  visual_direction: null  # Not applicable — no visual interface

