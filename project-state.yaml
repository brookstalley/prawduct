  - what: Replaced concern enumeration with structural characteristics + dynamic domain depth
    why: 7 hardcoded concerns violated 'Generality Over Enumeration' — the concern system did two different jobs (structural
      artifact routing and domain-specific depth) and the domain-specific half couldn't scale to cover all product types. Replaced
      with 5 stable structural characteristics for artifact routing and dynamic LLM-generated questions guided by 9 universal
      discovery dimensions and structural amplification rules. Eliminated 4 remaining_work items (deepen api_surface, deepen
      multi_party, additional domain overlays, open question about concern coverage). Domain-specific depth now comes from the
      LLM's own knowledge, not hardcoded question banks.
    blast_radius: All 6 skills, templates/project-state.yaml, project-state.yaml, docs/high-level-design.md, CLAUDE.md, all
      3 test scenarios
    classification: directional
    date: 2026-02-13
    retrospective: 'Concern enumeration violated Generality for weeks undetected. Root cause: Structural Critique Protocol trigger
      cadence too low (every 3 evals, effectively never), Directional Change Protocol had no learning step. The 17-file reform
      produced zero captured learnings until the user asked. Fix: retrospective step added to DCP, Structural Critique triggers
      expanded to include directional changes. Key insight: governance (Critic) validates quality but retrospective captures
      learning — both required for framework development.'
  - what: Unified governance and generalized artifact generation
    why: 'Framework violated ''Eat Your Own Cooking'' (separate governance paths for framework vs. product — 8 hooks in two
      parallel stacks, 2 Critic modes, 2 state files) and ''Generality Over Enumeration'' (Artifact Generator hardcoded 575
      lines of per-artifact format specs). Unified to: 5 hooks with single .session-governance.json state, 1 context-sensitive
      Critic with 9 checks and applicability table, Artifact Generator reduced from 789→189 lines by moving format specs to
      templates, observation backlog enabled for all projects, single Directional Change Protocol.'
    blast_radius: All 6 skills, .claude/hooks/ (8 deleted, 4 created, 2 updated), .claude/settings.json, templates/project-state.yaml,
      templates/product-brief.md, templates/data-model.md, tools/record-critic-findings.sh, tools/critic-reminder.sh, docs/high-level-design.md,
      docs/self-improvement-architecture.md, docs/doc-manifest.yaml, CLAUDE.md, project-state.yaml
    classification: directional
    date: 2026-02-14
    retrospective: 'Detection: The ''Eat Your Own Cooking'' violation (parallel governance stacks) was visible for weeks but
      not detected by the learning system because observation types didn''t include ''architectural inconsistency with stated
      principles.'' The Structural Critique Protocol could have caught this but its trigger cadence (every 3 evals) was too
      low. Process: The phased implementation (hooks → Critic → artifacts → docs) worked well — each phase was independently
      testable. The Critic review found 4 stale cross-references, confirming that documentation freshness checks catch real
      issues. Architecture: The unified governance state (.session-governance.json) creates a single point of failure — if the
      state file is corrupted, all governance tracking is lost. The previous dual-file approach had natural redundancy. Mitigation:
      SessionStart cleanup creates a fresh file each session, limiting blast radius. Generalization: This pattern (parallel
      implementations for ''framework'' and ''product'' that should be unified) should be checked whenever new framework capabilities
      are added — does the capability apply identically to both contexts?'
  - what: 'Observation triage and threshold change: archived 11 resolved files, triaged 18 noted observations, reduced triage
      overdue threshold from 14 days to 2 days'
    why: 27 active observation files with 67 observations had accumulated. 11 files were fully resolved but unarchived. 18 observations
