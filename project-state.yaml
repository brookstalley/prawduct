    # --- v1-widen (8 items) ---
    # Removed: "Create exposes_programmatic_interface templates" — replaced by amplification rules + process constraints in Artifact Generator
    # Removed: "Create has_multiple_party_types templates" — replaced by amplification rules + process constraints in Artifact Generator
    # Removed: "Critic: remaining product governance sub-components" — absorbed into existing checks (Coherence, Spec Compliance, Scope Discipline)
    # Removed: "Builder: structural-characteristic chunk patterns" — absorbed into Artifact Generator Phase D
    # Removed: "Mechanical sub-check tools" — enumerated scripts replaced by strengthening general Critic checks; mechanical enforcement via hooks is already built
    - item: "consumer-mobile-app test scenario"
      description: "Test scenario rubric exercising has_human_interface (modality: screen, platform: mobile) with mobile-specific constraints; also tests dynamic domain generation"
      phase: v1-widen
      requirements: [R7.2]
    - item: "Orchestrator: opinionated pushback"
      description: "Challenge user decisions that conflict with good practice; requires calibrated confidence and domain knowledge"
      phase: v1-widen
      requirements: [R1.5]
      skill: orchestrator
    - item: "Orchestrator: prior art awareness"
      description: "Surface existing solutions via web search during Stage 0-1; additive capability"
      phase: v1-widen
      requirements: [R1.7]
      skill: orchestrator
    - item: "Orchestrator: pacing sensitivity"
      description: "Detect and adapt to user impatience signals beyond risk-based defaults"
      phase: v1-widen
      requirements: [R1.8]
      skill: orchestrator
    - item: "Orchestrator: reclassification"
      description: "Recognize when product's structural characteristics fundamentally change during build, triggering re-evaluation of artifacts and discovery"
      phase: v1-widen
      requirements: [R5.4]
      skill: orchestrator
    - item: "Critic-Review Lenses integration"
      description: "Critic findings feed back to Review Lenses for pattern detection; Review Lens findings feed into Critic's continuous governance during build"
      phase: v1-widen
      requirements: [R3.1]
      skill: critic
    - item: "Review Lenses: variable-depth and rotating emphasis"
      description: "Lighter review for routine artifact generation, deeper for major scope changes; rotating lead lens (security, cost, etc.) to prevent blind spots"
      phase: v1-widen
      requirements: [R3.1]
      skill: review-lenses
    - item: "Artifact Generator: modular artifact updates"
      description: "When a decision changes, update only affected artifacts rather than regenerating all"
      phase: v1-widen
      requirements: [R2.4]
      skill: artifact-generator
    # Removed: "Mechanical enforcement for DCP retrospective" — implemented: directional_change tracking in .session-governance.json, governance-stop.sh check, DCP step instructions (2026-02-15)
    # --- v1-validation (3 items) ---
    - item: "Full V1 validation"
      description: "All scenarios passing end-to-end evaluation rubrics, framework fully self-governing"
      phase: v1-validation
      requirements: [R7.2]
    - item: "Builder: parallel chunk execution"
      description: "Execute independent chunks in parallel for faster builds"
      phase: v1-validation
      skill: builder
    - item: "Builder: incremental builds"
      description: "When artifacts change mid-build, identify affected chunks and re-execute only those"
      phase: v1-validation
      skill: builder
    # --- v1-new (3 items, from user feedback 2026-02-15) ---
    - item: "Closed-loop testing: debugging MCP server"
      description: "Dev-only MCP server baked into has_human_interface products exposing screenshot, navigate, interact, inspect, logs, state, accessibility audit, config, and seed data tools. Enables agent to verify UI output without human involvement. Phases: design → implement for React+Playwright → integrate with Builder → add visual verification to test specs and Critic."
      phase: v1-new
      skill: builder
    # Removed: "Existing project onboarding" — implemented: onboarding.md with 4-phase process (codebase analysis, user confirmation, artifact generation, enter iteration) (2026-02-15)
    - item: "Old prawduct version detection and migration"
      description: "Detect old prawduct project-state.yaml schemas and artifact structures during Session Resumption. Enter migration mode to map old artifacts to current structure. Add version field to project-state.yaml template."
      phase: v1-new
      skill: orchestrator
    # --- v1.5 (5 items) ---
    - item: "C7 Trajectory Monitor as dedicated component"
      description: "Full trajectory management beyond governance checkpoints and cross-chunk reviews; dedicated monitoring component"
      phase: v1.5
      requirements: [R4.1, R4.2, R4.3]
