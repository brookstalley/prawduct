    classification: directional
    date: 2026-02-14
  - what: 'User feedback overhaul: remove confirmation pauses, eliminate Stage 0.5, apply lenses to all products, fix project
      naming, gate skill/template reads behind Orchestrator activation'
    why: 'Real users reported four friction areas: (1) framework stops too often asking permission at every stage gate, (2)
