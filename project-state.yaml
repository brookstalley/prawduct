# =============================================================================
# CHANGE LOG
# =============================================================================

change_log:
  - what: "Phase 1 complete: vertical slice through family utility scenario"
    why: "Proved end-to-end path from vague input through artifact generation with review"
    blast_radius: "All skills, templates, project-state schema"
    classification: functional
    date: 2026-02-01
  - what: "Phase 2 build loop: added Stages 4-6, Builder skill, Critic product governance"
    why: "Extended framework from discovery-only to full build-and-iterate cycle"
    blast_radius: "Orchestrator, Artifact Generator, new Builder skill, Critic, family utility eval rubric"
    classification: functional
    date: 2026-02-10
  - what: "Phase 2 widening: added automation shape with Testing Lens"
    why: "First shape beyond UI Application — templates, domain analyzer extensions, review lens additions"
    blast_radius: "Domain Analyzer, Artifact Generator, Review Lenses, new automation templates, background-data-pipeline scenario"
    classification: functional
    date: 2026-02-11
  - what: "Observation triage process + eval fixes from family-utility eval run 3"
    why: "Observations were captured but had no process for being tracked or surfaced. Added observation_backlog to project-state.yaml, triage step to evaluation methodology, Session Resumption surfaces pending items. Fixed family-utility scenario (novel game timer iteration request), softened Critic criterion for low-risk products, formalized two-phase eval approach."
    blast_radius: "project-state.yaml schema, Orchestrator Session Resumption, evaluation-methodology.md, family-utility scenario rubric, observation file statuses"
    classification: functional
    date: 2026-02-11
  - what: "Self-hosted framework development via Orchestrator"
    why: "Framework development now routes through the Orchestrator (Session Resumption, Stage 6 iteration) instead of a separate checklist. Solves the observation capture gap — FRP fires at stage transitions regardless of whether the project is a user product or the framework itself."
    blast_radius: "CLAUDE.md routing, Orchestrator project directory logic and Session Resumption, framework development workflow"
    classification: functional
    date: 2026-02-11
  - what: "Replaced product shape taxonomy with concern-based classification"
    why: "Fixed shapes (UI Application, API, Automation, Multi-Party, Hybrid) violated 'Generality Over Enumeration' principle. Products like earbud firmware, browser extensions, smart contracts don't fit any shape. Replaced with 7 composable concern dimensions (human_interface, unattended_operation, api_surface, multi_party, constrained_environment, external_integrations, sensitive_data) that combine freely. Added Structural Critique Protocol to catch similar foundational issues."
    blast_radius: "Domain Analyzer, Artifact Generator, Review Lenses, Orchestrator, Critic, project-state schema, high-level design, principles, all test scenarios, CLAUDE.md, observation schema"
    classification: directional
    date: 2026-02-12
  - what: "Consolidated work tracking into project-state.yaml remaining_work"
    why: "Work tracking was scattered across 8+ files with partial conflicts. Made remaining_work the canonical tracker with 23 phased items (v1-widen, v1-validation, v1.5). Converted skill 'Extending This Skill' sections from feature roadmaps to extension guidance. Fixed staleness in requirements.md and high-level-design.md."
    blast_radius: "project-state.yaml, CLAUDE.md, docs/requirements.md, docs/high-level-design.md, all 6 skill SKILL.md files"
    classification: directional
    date: 2026-02-13
  - what: "Replaced concern enumeration with structural characteristics + dynamic domain depth"
    why: "7 hardcoded concerns violated 'Generality Over Enumeration' — the concern system did two different jobs (structural artifact routing and domain-specific depth) and the domain-specific half couldn't scale to cover all product types. Replaced with 5 stable structural characteristics for artifact routing and dynamic LLM-generated questions guided by 9 universal discovery dimensions and structural amplification rules. Eliminated 4 remaining_work items (deepen api_surface, deepen multi_party, additional domain overlays, open question about concern coverage). Domain-specific depth now comes from the LLM's own knowledge, not hardcoded question banks."
    blast_radius: "All 6 skills, templates/project-state.yaml, project-state.yaml, docs/high-level-design.md, CLAUDE.md, all 3 test scenarios"
    classification: directional
    date: 2026-02-13
    retrospective: "Concern enumeration violated Generality for weeks undetected. Root cause: Structural Critique Protocol trigger cadence too low (every 3 evals, effectively never), Directional Change Protocol had no learning step. The 17-file reform produced zero captured learnings until the user asked. Fix: retrospective step added to DCP, Structural Critique triggers expanded to include directional changes. Key insight: governance (Critic) validates quality but retrospective captures learning — both required for framework development."
  - what: "Created has_human_interface (modality: screen) templates and integrated into artifact generator, review lenses, and test scenario"
    why: "Products with has_human_interface were detected and classified but had no artifact templates. Added 6 templates (information-architecture, screen-spec, design-direction, accessibility-spec, localization-requirements, onboarding-spec), full Phase C artifact generation instructions, chunk ordering for build planning, cross-artifact consistency checks, hardcoded lens adjustments, and updated family-utility rubric from must-not-do to must-do with proportionality criteria."
    blast_radius: "templates/human-interface/ (6 new), skills/artifact-generator/SKILL.md, skills/review-lenses/SKILL.md, tests/scenarios/family-utility.md, CLAUDE.md, project-state.yaml, docs/high-level-design.md, docs/doc-manifest.yaml"
    classification: functional
    date: 2026-02-13
  - what: "Added post-change retrospective to Directional Change Protocol and expanded Structural Critique triggers"
    why: "The DCP had governance (Critic review) but no learning step. A 17-file architectural reform produced zero captured learnings. The Structural Critique Protocol trigger cadence (every 3 evals) was too low to catch structural violations. Added DCP step 7 (mandatory retrospective with three questions: detection, process, architecture), expanded SCP triggers to include directional changes, added retrospective field to change_log schema, and documented framework development learning path in self-improvement-architecture.md."
    blast_radius: "skills/orchestrator/SKILL.md, templates/project-state.yaml, project-state.yaml, docs/self-improvement-architecture.md, framework-observations/ (3 new observations)"
    classification: functional
    date: 2026-02-13
  - what: "Unified governance and generalized artifact generation"
    why: "Framework violated 'Eat Your Own Cooking' (separate governance paths for framework vs. product — 8 hooks in two parallel stacks, 2 Critic modes, 2 state files) and 'Generality Over Enumeration' (Artifact Generator hardcoded 575 lines of per-artifact format specs). Unified to: 5 hooks with single .session-governance.json state, 1 context-sensitive Critic with 9 checks and applicability table, Artifact Generator reduced from 789→189 lines by moving format specs to templates, observation backlog enabled for all projects, single Directional Change Protocol."
    blast_radius: "All 6 skills, .claude/hooks/ (8 deleted, 4 created, 2 updated), .claude/settings.json, templates/project-state.yaml, templates/product-brief.md, templates/data-model.md, tools/record-critic-findings.sh, tools/critic-reminder.sh, docs/high-level-design.md, docs/self-improvement-architecture.md, docs/doc-manifest.yaml, CLAUDE.md, project-state.yaml"
    classification: directional
    date: 2026-02-14
    retrospective: "Detection: The 'Eat Your Own Cooking' violation (parallel governance stacks) was visible for weeks but not detected by the learning system because observation types didn't include 'architectural inconsistency with stated principles.' The Structural Critique Protocol could have caught this but its trigger cadence (every 3 evals) was too low. Process: The phased implementation (hooks → Critic → artifacts → docs) worked well — each phase was independently testable. The Critic review found 4 stale cross-references, confirming that documentation freshness checks catch real issues. Architecture: The unified governance state (.session-governance.json) creates a single point of failure — if the state file is corrupted, all governance tracking is lost. The previous dual-file approach had natural redundancy. Mitigation: SessionStart cleanup creates a fresh file each session, limiting blast radius. Generalization: This pattern (parallel implementations for 'framework' and 'product' that should be unified) should be checked whenever new framework capabilities are added — does the capability apply identically to both contexts?"
  - what: "Observation triage and threshold change: archived 11 resolved files, triaged 18 noted observations, reduced triage overdue threshold from 14 days to 2 days"
    why: "27 active observation files with 67 observations had accumulated. 11 files were fully resolved but unarchived. 18 observations in noted status needed triage. The 14-day triage threshold was too long for the framework's rapid development pace — observations were going stale before being triaged."
    blast_radius: "framework-observations/ (18 status transitions, 11 files archived), project-state.yaml (last_triage, 10 new backlog items), tools/session-health-check.sh (threshold), docs/evaluation-methodology.md (threshold)"
    classification: process
    date: 2026-02-14

