  strategy: "Vertical slice, then widen (see docs/high-level-design.md § Bootstrapping)"
  # remaining_work is the canonical tracker for what remains to build.
  # Remove items as they are completed; add items as new work is identified.
  # Skill "Extending This Skill" sections provide guidance on HOW to extend
  # each skill; this list tracks WHAT remains and WHEN (by phase).
